name: verify

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: recovered-app/package-lock.json

      - name: Repository structure check
        run: python3 scripts/check_repository.py

      - name: Install recovered source dependencies
        working-directory: recovered-app
        run: npm ci

      - name: Build recovered source
        working-directory: recovered-app
        run: npm run build
